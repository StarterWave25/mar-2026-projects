<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reactive expense Tracker using Javascript Proxy objects</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
        integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy"
        crossorigin="anonymous"></script>
</head>

<body class="container-lg py-3 bg-dark-subtle">
    <h1>Expense Tracker</h1>
    <div class="d-grid gap-3 mb-2 p-4 bg-info-subtle w-50 rounded border border-3 border-warning">
        <h3>Add Expenses</h3>
        <div class="row gap-3">
            <label for="food" class="col-3 fs-5">Food: </label>
            <input type="number" class="col-4" id="food">
            <button id="food-add" class="col-2 btn btn-success">Add</button>
        </div>
        <div class="row gap-3">
            <label for="travel" class="col-3 fs-5">Travel: </label>
            <input type="number" class="col-4" id="travel">
            <button id="travel-add" class="col-2 btn btn-success">Add</button>
        </div>
        <div class="row gap-3">
            <label for="shopping" class="col-3 fs-5">Shopping: </label>
            <input type="number" class="col-4" id="shopping">
            <button id="shopping-add" class="col-2 btn btn-success">Add</button>
        </div>
    </div>
    <div id="logs" class="border border-3 w-50 border-danger p-2 my-3 fs-5 font-weight-bold bg-danger-subtle rounded"
        style="display: none;"></div>
    <h2 class="pb-3">Total expenses: </h2>
    <div id="total-expenses">

    </div>
    <script src="expense-tracker.js"></script>
</body>

</html>
