    <ul class="nav-link-btns">
      <li class="nav-links">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" data-supported-dps="24x24" fill="currentColor"

        </svg>
        <span class="nav-link-span">Home</span>
      </li>
      <li class="nav-links">

        </svg>
        <span class="nav-link-span">My Network</span>
      </li>
      <li class="nav-links">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" data-supported-dps="24x24" fill="currentColor"
          class="mercado-match" width="24" height="24" focusable="false">
          <path
            d="M17 6V5a3 3 0 00-3-3h-4a3 3 0 00-3 3v1H2v4a3 3 0 003 3h14a3 3 0 003-3V6zM9 5a1 1 0 011-1h4a1 1 0 011 1v1H9zm10 9a4 4 0 003-1.38V17a3 3 0 01-3 3H5a3 3 0 01-3-3v-4.38A4 4 0 005 14z">

          class="mercado-match" width="24" height="24" focusable="false">

          </path>
        </svg>
        <span class="nav-link-span">Messaging</span>
      </li>
      <li class="nav-links">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" data-supported-dps="24x24" fill="currentColor"
          class="mercado-match" width="24" height="24" focusable="false">

            d="M22 19h-8.28a2 2 0 11-3.44 0H2v-1a4.52 4.52 0 011.17-2.83l1-1.17h15.7l1 1.17A4.42 4.42 0 0122 18zM18.21 7.44A6.27 6.27 0 0012 2a6.27 6.27 0 00-6.21 5.44L5 13h14z">

      <li class="nav-links">

  <div class="resume-content-container">
    <h2>Your Resume Content</h2>
    <div class="resume-contents">
      <div class="resume-img-container">
        <img src="img/praveen-sir-img.jpg" alt="Resume Image" class="resume-img" />
      </div>
      <div class="resume-fields-container">
        <div class="resume-field">
          <span class="fullname-field-span">Full Name : </span>
          <p class="fullname-field-para"></p>
        </div>
        <div class="resume-field">
          <span class="tagline-field-span">Tagline : </span>
          <p class="tagline-field-para"></p>
        </div>
        <div class="resume-field">
          <span class="place-field-span">Place : </span>
          <p class="place-field-para"></p>
        </div>
        <div class="resume-field">
          <span class="summary-field-span">Summary :</span>
          <p class="summary-field-para"></p>
        </div>
        <div class="resume-field">
          <span class="experience-field-span">Experience : </span>
          <div class="experience-field-para"></div>
        </div>
        <div class="resume-field">
          <span class="skills-field-span">Skills : </span>
          <p class="skills-field-para"></p>
        </div>
        <div class="resume-field">
          <span class="language-field-span">Languages : </span>
          <p class="language-field-para"></p>
        </div>
        <div class="resume-field">
          <span class="education-field-span">Education : </span>
          <p class="education-field-para"></p>
        </div>
        <div class="resume-field">
          <span class="contact-field-span">Contact : </span>
          <p class="contact-field-para"></p>
        </div>
      </div>
      <!-- <button class="edit-button">Edit</button> -->
      <!-- <a href="#" class="edit-btn">✏️ Edit</a> -->
      <button class="edit-button">
        <img src="img/edit-button.svg" alt="Edit Button" />
      </button>
    </div>
  </div>
  <div class="resume-templates-container">
    <h2>Best Resume Templates for you</h2>
    <div class="resume-templates-grid">
      <div class="resume-template"></div>
      <div class="resume-template"></div>
      <div class="resume-template"></div>
      <div class="resume-template"></div>
      <div class="resume-template"></div>
      <div class="resume-template"></div>
      <div class="resume-template"></div>
      <div class="resume-template"></div>
      <div class="resume-template"></div>
