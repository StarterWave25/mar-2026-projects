<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0px;
        padding: 0px;
        font-family: Arial, Helvetica, sans-serif;
      }
      body {
        padding-top: 90px;
      }
      header {
        display: flex;
        align-items: center;
        position: fixed;
        top: 0px;
        right: 0px;
        left: 0px;
        height: 90px;
        z-index: 100;
        background-color: rgb(0, 123, 255);
        font-size: 30px;
        font-weight: bolder;
        font-family: Arial, Helvetica, sans-serif;
        color: white;
        padding-left: 20px;
      }
      .resume-content-container {
        padding: 40px;
        margin-bottom: 50px;
      }
      .resume-content-container h2 {
        text-align: center;
      }
      .resume-contents {
        display: flex;
        justify-content: center;
        align-items: flex-start;
        max-width: 1000px;
        /* margin-top: 40px; */
        margin: 40px auto;
        position: relative;
      }
      .resume-fields-container {
        display: flex;
        flex-direction: column;
        gap: 15px;
        flex: 3;
      }
      .resume-field-span {
        font-weight: bold;
      }
      .resume-field p {
        margin-top: 5px;
      }
      .resume-contents .edit-button {
        position: absolute;
        top: 0px;
        right: 0px;
        padding: 0.5em 1em;
        background-color: rgb(23, 128, 241);
        border: 1px solid rgb(0, 115, 255);
        border-radius: 10px;
        color: white;
        transition: padding 0.15s;
        cursor: pointer;
      }
      .resume-contents .edit-button:hover {
        padding: 0.7em 1.2em;
      }
      .resume-img-container {
        display: flex;
        justify-content: center;
        flex: 2;
      }
      .resume-img {
        width: 150px;
        height: 150px;
        border: 1px solid;
        border-radius: 50%;
        object-fit: cover;
      }
      .resume-fields-container {
        display: flex;
        flex-direction: column;
      }
      .resume-templates-container h2 {
        text-align: center;
        margin-bottom: 30px;
      }
      .resume-templates-grid {
        display: grid;
        grid-template-columns: repeat(3, 300px);
        gap: 30px;
        justify-content: center;
      }

      .resume-template {
        width: 300px;
        height: 400px;
        background-color: gray;
        transition: transform 0.15s;
      }
      .resume-template:hover {
        transform: scale(1.03);
      }
    </style>
  </head>
  <body>
    <header>Resume Builder</header>
    <div class="resume-content-container">
      <h2>Your Resume Content</h2>
      <div class="resume-contents">
        <div class="resume-img-container">
          <img src="" alt="Resume Image" class="resume-img" />
        </div>
        <div class="resume-fields-container">
          <div class="resume-field">
            <span class="fullname-field-span">Full Name</span>
            <p class="fullname-field-para"></p>
          </div>
          <div class="resume-field">
            <span class="tagline-field-span">Tagline</span>
            <p class="tagline-field-para"></p>
          </div>
          <div class="resume-field">
            <span class="place-field-span">Place</span>
            <p class="place-field-para"></p>
          </div>
          <div class="resume-field">
            <span class="summary-field-span">Summary</span>
            <p class="summary-field-para"></p>
          </div>
          <div class="resume-field">
            <span class="experience-field-span">Experience</span>
            <p class="experience-field-para"></p>
          </div>
          <div class="resume-field">
            <span class="education-field-span">Education</span>
            <p class="education-field-para"></p>
          </div>
          <div class="resume-field">
            <span class="contact-field-span">Contact</span>
            <p class="contact-field-para"></p>
          </div>
        </div>

        <button class="edit-button">Edit</button>
      </div>
    </div>
    <div class="resume-templates-container">
      <h2>Best Resume Templates for you</h2>
      <div class="resume-templates-grid">
        <div class="resume-template"></div>
        <div class="resume-template"></div>
        <div class="resume-template"></div>
        <div class="resume-template"></div>
        <div class="resume-template"></div>
        <div class="resume-template"></div>
        <div class="resume-template"></div>
        <div class="resume-template"></div>
        <div class="resume-template"></div>
      </div>
    </div>
  </body>
</html>
