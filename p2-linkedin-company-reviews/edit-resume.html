<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Resume</title>
    <link rel="stylesheet" href="styles/global.css" />
    <link rel="stylesheet" href="styles/edit-resume.css" />
    <link rel="icon" type="image/svg+xml" href="https://static.licdn.com/aero-v1/sc/h/akt4ae504epesldzj74dzred8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>

<body>
    <main>
        <header class="resume-header">
            <a href="user-profile.html">
                <button class="left-arrow-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor"
                        class="bi bi-arrow-left" viewBox="0 0 16 16">
                        <path fill-rule="evenodd"
                            d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8" />
                    </svg>
                </button>
            </a>
            <div class="resume-btns">
                <button class="buttons edit-btn">Edit Content</button>
                <button class="buttons download-btn">Download as PDF</button>
            </div>
        </header>
        <section class="resume-section" title="Double Click to View in Full Screen">

        </section>
        <section class="resume-templates-section">
            <div class="resume-card" id="tpl-1"></div>

            <div class="resume-card" id="tpl-2"></div>

            <div class="resume-card" id="tpl-3"></div>

            <div class="resume-card" id="tpl-4"></div>

            <div class="resume-card" id="tpl-5"></div>

            <div class="resume-card" id="tpl-6"></div>

            <div class="resume-card" id="tpl-7"></div>

            <div class="resume-card" id="tpl-8"></div>

            <div class="resume-card" id="tpl-9"></div>

            <div class="resume-card" id="tpl-10"></div>
        </section>
    </main>
    <script src="scripts/resume-templates.js"></script>
    <script src="scripts/resume.js"></script>
</body>

</html>
